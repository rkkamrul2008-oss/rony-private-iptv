name: IPTV Link Auto Scraper

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 */3 * * *' # প্রতিদিন ১ বারের বদলে এখন প্রতি ৩ ঘণ্টা পর পর অটো-রান হবে

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run IPTV Scraper Script
      run: python scraper.py

    - name: Commit and Push final playlist
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add live_*.m3u
        git commit -m "Automated Playlist Update with YouTube Support" || echo "No changes to commit"
        git push
